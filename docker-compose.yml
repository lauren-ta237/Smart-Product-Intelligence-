services:
  postgres:
    image: postgres:17-alpine
    container_name: smart_product_postgres
    restart: always
    environment:
      POSTGRES_DB: smart_product_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "l#urenT-123"  # Updated to match your connection string
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: smart_product_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: